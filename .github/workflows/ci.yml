name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finsentiment-api .

      - name: Start container and health check
        run: |
          docker run -d --name finsentiment-api -p 8000:8000 finsentiment-api
          echo "Waiting for API to start..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              break
            fi
            sleep 2
          done

      - name: Test API endpoint
        run: |
          curl -sf -X POST http://localhost:8000/api/v1/analyze \
            -H "Content-Type: application/json" \
            -d '{"headline": "Company reports record profits"}' | python3 -m json.tool

      - name: Stop container
        run: docker stop finsentiment-api
